subject_meta:
  title: "Fünf-Faktoren-Modell (Big Five)"
  discipline: "Persönlichkeitspsychologie / Psychometrie"
  difficulty: "Erstsemester-Komplexitätsgrad"
  tab_color: "#a8d8ea"
  tab_number: 8

content_blocks:
  - type: "lead"
    text: "Warum verhältst du dich in der Vorlesung anders als bei einer Party? Das Fünf-Faktoren-Modell behauptet, dass fünf stabile Persönlichkeitsdimensionen unser Verhalten über Situationen hinweg vorhersagen – doch diese Behauptung ist umstritten."

  - type: "definition"
    text: "Das Fünf-Faktoren-Modell (Big Five, OCEAN) beschreibt Persönlichkeit als fünf unabhängige Dimensionen: Offenheit, Gewissenhaftigkeit, Extraversion, Verträglichkeit und Neurotizismus. Es basiert auf der lexikalischen Hypothese, die besagt, dass alle bedeutsamen Persönlichkeitsunterschiede in natürlicher Sprache kodiert sind."
    highlight_blue: ["Fünf-Faktoren-Modell", "Lexikalische Hypothese"]
    tooltips:
      Fünf-Faktoren-Modell: "Ein Persönlichkeitsmodell, das alle individuellen Unterschiede in fünf unabhängige Dimensionen ordnet"
      Lexikalische Hypothese: "Die Annahme, dass bedeutsame Persönlichkeitsunterschiede in natürlicher Sprache als beschreibende Wörter kodiert sind"

  - type: "explanation"
    text: |
      **Die lexikalische Hypothese: Sprache als Spiegel der Persönlichkeit**

      McCrae und John (1992) verorten den theoretischen Ursprung des Modells in der lexikalischen Hypothese. Diese besagt, dass bedeutsame individuelle Unterschiede in natürlicher Sprache kodiert werden – je wichtiger ein Merkmal, desto mehr Begriffe existieren dafür. Die Sammlung aller adjektivischen Persönlichkeitsbeschreibungen bildet das Rohmaterial für die faktorenanalytische Extraktion.

      **Die fünf Dimensionen: OCEAN**

      Die faktorenanalytische Auswertung adjektivischer Selbstbeschreibungen führte zur Extraktion von fünf breiten Dimensionen. McCrae und John (1992) nennen diese Offenheit für Erfahrung, Gewissenhaftigkeit, Extraversion, Verträglichkeit und Neurotizismus. Jede Dimension umfasst sechs Facetten, die im NEO-PI-R differenziert erfasst werden.

      Costa und McCrae (1992) operationalisierten die fünf Dimensionen im Revised NEO Personality Inventory mit 240 Items. Die Facetten erlauben eine nuanciertere Diagnostik als die reinen Faktorenrohwerte. Das NEO-PI-R ist eines der am weitesten verbreiteten Persönlichkeitsinventare in der klinischen und differentiellen Psychologie.

      **Kurze Messung: Das BFI-K**

      Rammstedt und John (2005) entwickelten den Big-Five-Inventory-Kurzversion mit nur 21 Items. Diese ökonomische Erhebungsmethode ist für Survey-Forschung und Screening geeignet. Die Konvergenz mit dem ausführlichen NEO-PI-R ist für alle fünf Dimensionen empirisch belegt.

      **Block (2010): Die fundamentale Kritik**

      Block (2010) richtet eine fundamentale Kritik gegen die fünffaktoriale Rahmung der Persönlichkeit. Er argumentiert, dass die Methodenvarianz der Selbstberichtsverfahren die fünf Faktoren künstlich aufbläht. Dasselbe Antwortformat über hunderte Items hinweg erzeugt gemeinsame Varianz, die nicht Persönlichkeit, sondern Antworttendenzen widerspiegelt.

      Block (2010) zeigt, dass die Big Five nur moderate Vorhersagekraft für konkretes Verhalten besitzen. Die Korrelation zwischen Selbstbericht-Traitmaßen und beobachtetem Verhalten bleibt modest. Diese Diskrepanz zwischen Trait-Struktur und Verhaltensvorhersage illustriert die Situationsspezifität menschlichen Handelns.

      **Kulturelle Replikation und ihre Grenzen**

      McCrae und John (1992) weisen auf die kulturvergleichende Replikation der fünf Faktoren hin. Das Modell wurde in zahlreichen Sprachräumen bestätigt, doch die Replikation ist nicht universell. Alternative Modelle wie HEXACO ergänzen den theoretischen Debattenraum um eine sechste Dimension.
