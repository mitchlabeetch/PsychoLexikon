  - type: "deep_dive"
    text: |-
      **Das Limit der Kapazität und seine Folgen**

      Die Arbeitsgedächtnisspanne liegt bei etwa sieben Elementen, doch die tatsächliche Leistung hängt von der Art der Information ab. Phonologisch ähnliche Wörter verdrängen sich gegenseitig, weil sie im selben Speicherkanal kollidieren. Die Artikulationsunterdrückung demonstriert, dass die phonologische Schleife auf subvokale Repetition angewiesen ist.

      **Kritik und aktuelle Erweiterungen**

      Baddeley (2012) räumte ein, dass die Zentrale Exekutive als homunkulus-artige Instanz zu diffus bleibt. Neuere Ansätze integrieren das Modell in neuronale Netzwerke und betonen die Interaktion mit Aufmerksamkeitsnetzwerken des Gehirns. Trotz dieser Kritik bleibt das Mehrkomponentenmodell das dominierende Rahmenwerk der Gedächtnisforschung.
