subject_meta:
  title: "Das Mehrkomponentenmodell des Arbeitsgedächtnisses"
  discipline: "Kognitionspsychologie / Gedächtnisforschung"
  difficulty: "Erstsemester-Komplexitätsgrad"
  tab_color: "#c7b8ea"
  tab_number: 3

content_blocks:
  - type: "lead"
    text: "Warum kannst du gleichzeitig telefonisch Wegbeschreibungen entgegennehmen und durch den Stau navigieren, ohne sofort alles zu vergessen? Das Arbeitsgedächtnis arbeitet nicht als einzelnes Fach, sondern als koordiniertes Team aus spezialisierten Subsystemen."

  - type: "definition"
    text: "Das Arbeitsgedächtnis ist ein kognitives System, das Informationen kurzfristig speichert und gleichzeitig bearbeitet. Es besteht aus mehreren spezialisierten Komponenten, die von einer zentralen Steuerinstanz koordiniert werden."
    highlight_blue: ["Arbeitsgedächtnis"]
    tooltips:
      Arbeitsgedächtnis: "Ein kognitives System, das Informationen kurzfristig speichert und gleichzeitig bearbeitet — wie ein mentaler Schreibtisch, auf dem du rechnest und notierst."

  - type: "explanation"
    text: |-
      **Das Arbeitsgedächtnis als vierbändiges Orchester**

      Baddeley & Hitch (1974) postulierten das **Arbeitsgedächtnis** als eigenständiges System neben dem Langzeitgedächtnis. Das Modell umfasst vier Bausteine: zwei **Slave-Systeme** (passive Speicher), eine **Zentrale Exekutive** (Kontrollinstanz) und später den **Episodischen Puffer** (Integrator). Diese Architektur erklärt, warum wir gleichzeitig telefonieren und navigieren können, ohne sofort alles zu vergessen.

      Die beiden Slave-Systeme arbeiten weitgehend unabhängig voneinander, solange die Zentrale Exekutive sie koordiniert. Das erklärt, warum visuelle und sprachliche Ablenkungen unterschiedliche Fehler produzieren.

      **Die Slave-Systeme als passive Speicher**

      Die **Phonologische Schleife** nimmt sprachliche Informationen auf und hält sie durch innere Wiederholung aktiv. Sie ist verantwortlich für die Fähigkeit, Telefonnummern zu behalten, während man sie eintippt. Die **Visuell-räumliche Notizblock** speichert Bilder und räumliche Anordnungen — etwa das Layout eines fremden Raums.

      Lautlich ähnliche Wörter wie "Mahn", "Bahn", "Kahn" überlagern sich in der phonologischen Schleife gegenseitig und reduzieren die **Arbeitsgedächtnisspanne**. Die **Artikulationsunterdrückung** tritt auf, wenn du gleichzeitig lallst oder sprichst — deine innere Wiederholung wird blockiert.

      **Die Zentrale Exekutive als Dirigent**

      Die **Zentrale Exekutive** lenkt die **Aufmerksamkeitskontrolle**, wechselt zwischen Aufgaben und verbindet das Arbeitsgedächtnis mit dem Langzeitgedächtnis. Sie besitzt selbst keinen Speicher, sondern fungiert als reine Steuerinstanz. Ohne sie würden die Slave-Systeme widersprüchliche Informationen parallel verarbeiten.

      **Der Episodische Puffer als Szenen-Archiv**

      Baddeley (2012) erweiterte das Modell um den **Episodischen Puffer**, um komplexe Szeneintegration zu erklären. Dieser Baustein verknüpft visuelle, sprachliche und zeitliche Informationen zu einem kohärenten Erlebnis. Er ermöglicht es, einen Filmplot zu verfolgen, während du gleichzeitig isst oder sprichst.

      **Empirische Basis der Komponententrennung**

      Alloway et al. (2006) zeigten empirisch, dass verbale und visuell-räumliche Arbeitsgedächtniskomponenten bei Kindern tatsächlich separierbar sind. Kinder mit Defiziten in der phonologischen Schleife konnten dennoch räumliche Muster reproduzieren. Diese Doppeldissociation ist ein zentrales Evidenzkriterium für modulare Systeme.
