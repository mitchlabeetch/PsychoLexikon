subject_meta:
  title: "Berliner Intelligenzstrukturmodell (BIS)"
  discipline: "Differenzielle Psychologie / Intelligenzforschung"
  difficulty: "Erstsemester-Komplexitätsgrad"
  tab_color: "#f4b8c5"
  tab_number: 5

content_blocks:
  - type: "lead"
    text: "Warum löst der eine ein Rätsel in Sekunden, der andere braucht Minuten? Jägers Berliner Intelligenzstrukturmodell trennt geistige Schnelligkeit von geistiger Tiefe — und zeigt, wie beide zusammenspielen."

  - type: "definition"
    text: "Das Berliner Intelligenzstrukturmodell (BIS) ist ein Faktorenmodell der Intelligenz, das geistige Leistung als Kreuzung von zwei Prozessfaktoren (Verarbeitungskapazität und -geschwindigkeit) mit drei Inhaltsfaktoren (verbal, numerisch, figural) beschreibt."
    highlight_blue: ["Faktorenmodell", "Verarbeitungskapazität", "Verarbeitungsgeschwindigkeit", "Inhaltsfaktoren"]
    tooltips:
      Faktorenmodell: "Ein statistisches Modell, das Intelligenz als Zusammenspiel verschiedener Teilfätten darstellt, die durch Faktorenanalyse aus Testdaten gewonnen werden."
      Verarbeitungskapazität: "Das mentale Fassungsvermögen — wie viele Informationen du gleichzeitig im Kopf halten und verknüpfen kannst, vergleichbar mit dem Arbeitsspeicher eines Computers."
      Verarbeitungsgeschwindigkeit: "Die reine Tempo-Komponente des Denkens — wie schnell du einfache Operationen ausführst, ohne dass die Aufgabe selbst schwieriger wird."
      Inhaltsfaktoren: "Die drei Wissensdomänen, in denen sich Intelligenz zeigt: Sprache (verbal), Zahlen (numerisch) und Bilder bzw. Formen (figural)."

  - type: "explanation"
    text: |
      **Kernidee: Intelligenz ist ein Gitter, keine Leiter.**

      Jäger (1984) lehnte die Vorstellung ab, Intelligenz lasse sich auf einen einzigen IQ-Wert reduzieren. Stattdessen schlug er ein zweidimensionales Raster vor. **Operative Faktoren** beschreiben, *wie* das Gehirn arbeitet; **Inhaltsfaktoren** beschreiben, *woran* es arbeitet.

      ### Die zwei operativen Faktoren: Wie das Gehirn verarbeitet

      **Verarbeitungskapazität** (Gedächtnisbandbreite) misst, wie viele Elemente du gleichzeitig erfassen kannst. Jemand mit hoher Kapazität erkennt komplexe Muster schnell, weil er mehr Bausteine parallel im Blick behält. **Verarbeitungsgeschwindigkeit** (Tempo) misst die reine Flüssigkeit elementarer Operationen — vergleichbar mit der Taktfrequenz eines Prozessors. Beide Faktoren sind korreliert, aber empirisch trennbar.

      ### Die drei Inhaltsfaktoren: Womit das Gehirn arbeitet

      Jede intelligente Leistung braucht einen Gegenstand. Der **verbale Faktor** erfasst Sprachverständnis und Wortfluss. Der **numerische Faktor** erfasst Rechnen und Zahlenlogik. Der **figurale Faktor** erfasst räumliches Vorstellungsvermögen und Mustererkennung in Bildern. Diese Unterscheidung erklärt, warum jemand mathematisch brillieren, aber schlecht in Analogien aus Sprache kann — oder umgekehrt.

      ### Das Intersektionsmodell: 2 × 3 = 6 Facetten

      Kreuzt man beide Dimensionen, entstehen sechs **Intersektionszellen**. Beispiel: "figurale Verarbeitungsgeschwindigkeit" bedeutet, schnell einfache räumliche Vergleiche zu ziehen. "Numerische Verarbeitungskapazität" bedeutet, komplexe Zahlenbeziehungen parallel zu durchschauen. Jäger (1984) postulierte zudem einen allgemeinen Faktor, der alle sechs Zellen bedingt — allerdings schwächer als im klassischen g-Faktor-Modell.
    highlight_blue: ["Operative Faktoren", "Intersektionsmodell", "g-Faktor"]
    highlight_red: ["Jäger (1984) lehnte die Vorstellung ab, Intelligenz lasse sich auf einen einzigen IQ-Wert reduzieren", "Jäger (1984) postulierte zudem einen allgemeinen Faktor, der alle sechs Zellen bedingt"]
    tooltips:
      Operative Faktoren: "Die Prozess-Komponenten des Denkens: Wie schnell und wie viel kann das Gehirn gleichzeitig verarbeiten?"
      Intersektionsmodell: "Das mathematische Kreuzprodukt aus operativen und inhaltsbezogenen Faktoren, das 6 Teilfacetten der Intelligenz erzeugt."
      g-Faktor: "Die allgemeine Intelligenz nach Spearman — die Annahme, dass alle intellektuellen Aufgaben von einer einzigen, übergreifenden Fähigkeit abhängen."
    sources_inline:
      "Jäger (1984) lehnte die Vorstellung ab, Intelligenz lasse sich auf einen einzigen IQ-Wert reduzieren": "Jäger, A. O. (1984). Intelligenzstrukturforschung: Konkurrierende Modelle, neue Entwicklungen, Perspektiven. Psychologische Rundschau, 35(1), 21–35."
      "Jäger (1984) postulierte zudem einen allgemeinen Faktor, der alle sechs Zellen bedingt": "Jäger, A. O. (1984). Intelligenzstrukturforschung: Konkurrierende Modelle, neue Entwicklungen, Perspektiven. Psychologische Rundschau, 35(1), 21–35."

