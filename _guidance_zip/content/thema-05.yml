  - type: "deep_dive"
    text: |
      **Empirische Absicherung und der BIS-4 Test**

      Das Modell ist kein bloßer Gedankenentwurf. Süß und Beauducel (2015) bestätigten die facettenanalytische Struktur in einer großzügigen Stichprobe mit konfirmatorischer Faktorenanalyse. **Der BIS-4** ist das zugehörige Standardverfahren mit je zwei Subtests pro Intersektionszelle plus einem allgemeinen Faktor. Jäger, Süß und Beauducel (1997) legten die Testmanual-Struktur so an, dass jede Zelle separat auswertbar bleibt.

      ### Prozess vs. Inhalt: Warum die Trennung wichtig ist

      Klassische Intelligenztests wie der HAWIK mischen beides durcheinander. Der BIS trennt sie bewusst. Das erlaubt differenziertere Diagnosen: Ein Kind mit langsamer Verarbeitungsgeschwindigkeit aber guter Kapazität braucht andere Förderung als eines mit geringer Kapazität aber gutem Tempo. Beauducel, Brocke und Holling (2001) betonen, dass diese Differenzierung klinisch und pädagogisch relevant sei.

      ### Generalistische vs. Spezialisierte Intelligenz

      Jägers Modell steht im Spannungsfeld zwischen zwei Lagern. Die **Generalisten** (Spearman, Cattell) behaupten, eine einzige g-Fähigkeit erkläre alles. Die **Spezialisten** (Gardner, Thurstone) postulieren viele unabhängige Intelligenzen. Das BIS nimmt eine Zwischenposition ein: Es gibt einen allgemeinen Faktor, aber er erklärt nur einen Teil der Varianz. Die sechs Intersektionszellen fangen den Rest auf.
    highlight_red: ["Süß und Beauducel (2015) bestätigten die facettenanalytische Struktur", "Beauducel, Brocke und Holling (2001) betonen, dass diese Differenzierung klinisch und pädagogisch relevant sei"]
    sources_inline:
      "Süß und Beauducel (2015) bestätigten die facettenanalytische Struktur": "Süß, H.-M., & Beauducel, A. (2015). Facettenanalytische Konstruktvalidierung des Berliner Intelligenzstrukturmodells. Diagnostica, 61(3), 131–145. https://doi.org/10.1026/0012-1924/a000115"
      "Beauducel, Brocke und Holling (2001) betonen, dass diese Differenzierung klinisch und pädagogisch relevant sei": "Beauducel, A., Brocke, B., & Holling, H. (2001). Kognitive Fähigkeiten und Intelligenz. In H. Holling (Hrsg.), Sozialwissenschaftliche Evaluation (S. 119–153). Hogrefe."

  - type: "example"
    text: "Stell dir vor, du sitzt in einer deutschen Kantine und musst schnell entscheiden, welches Menü das günstigste Preis-Leistungs-Verhältnis bietet. Du liest die Preise (verbal), rechnest Portionen pro Euro (numerisch) und schätzt visuell, welcher Teller mehr enthält (figural). Gleichzeitig musst du mehrere Angebote im Kopf halten (Kapazität) und schnell vergleichen (Geschwindigkeit). Jemand mit hoher Kapazität aber niedriger Geschwindigkeit merkt sich alle fünf Menüs, braucht aber länger für den Vergleich. Jemand mit hoher Geschwindigkeit aber niedriger Kapazität entscheidet rasch, übersieht aber das vierte, bessere Angebot."

  - type: "summary"
    text: |
      - Intelligenz besteht im BIS-Modell aus 2 Prozessfaktoren (Kapazität, Geschwindigkeit) und 3 Inhaltsfaktoren (verbal, numerisch, figural), die 6 messbare Facetten erzeugen.
      - Der BIS-4 Test operationalisiert jede Intersektionszelle separat und ermöglicht so differenziertere Diagnosen als klassische IQ-Eintopf-Verfahren.
      - Das Modell vermittelt zwischen g-Faktor-Theorien und Mehrfachintelligenz-Ansätzen, indem es einen schwachen allgemeinen Faktor mit starken spezifischen Facetten kombiniert.

