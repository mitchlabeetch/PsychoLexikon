subject_meta:
  title: "Klassische und Operante Konditionierung"
  discipline: "Lernpsychologie / Verhaltensanalyse"
  difficulty: "Erstsemester-Komplexitätsgrad"
  tab_color: "#f4b8c5"
  tab_number: 4

content_blocks:
  - type: "lead"
    text: "Warum läuft dein Hund zur Küche, wenn du die Dose öffnest? Warum prüfst du reflexartig dein Handy, obwohl keine Benachrichtigung kam? Diese automatischen Reaktionen sind das Produkt zweier fundamentaler Lernmechanismen, die unser Verhalten formen, bevor wir überhaupt bewusst entscheiden."

  - type: "definition"
    text: "Konditionierung beschreibt Lernprozesse, bei denen ein Organismus durch wiederholte Erfahrung neue Reiz-Reaktions-Verknüpfungen erwirbt. Klassische Konditionierung koppelt Reize aneinander; operante Konditionierung formt Verhalten durch seine Konsequenzen."
    highlight_blue: ["Konditionierung", "Reiz-Reaktions-Koppelung"]
    tooltips:
      Konditionierung: "Ein Lernprozess, bei dem ein ursprünglich neutraler Reiz durch wiederholte Kopplung mit einem bedeutsamen Reiz eine Reaktion auslöst oder Verhalten durch Konsequenzen geformt wird."
      Reiz-Reaktions-Koppelung: "Die Verbindung zwischen einem bestimmten Reiz und der darauf folgenden Reaktion, die durch Übung festgelegt wird."

  - type: "explanation"
    text: |-
      **Klassische Konditionierung: Das Lernen von Signalen**

      Pawlow entdeckte, dass ein neutraler Reiz nach wiederholter Paarung mit Nahrung allein die Speichelsekretion auslösen kann. Diese **Reiz-Reaktions-Koppelung** bildet den Kern der klassischen **Konditionierung**: Ein **unbedingter Reiz** (Nahrung) erzeugt eine ungelernte Reaktion (Speichel), und ein **bedingter Reiz** (Glocke) erlernt diese Reaktion durch Assoziation. Lutz (2007) beschreibt dies als das fundamentale Prinzip der Signalbildung im Verhalten.

      Rescorla (1988) argumentierte, dass klassische Konditionierung primär ein Lernen über vorhersagbare Beziehungen zwischen Reizen ist, nicht bloß ein Reflex-Lernen. Der Organismus lernt, welche Reize andere ankündigen — ein kognitiver Prozess, der weit über mechanische Paarung hinausgeht.

      **Extinktion und die Unberechenbarkeit des Vergessens**

      Die **Extinktion** tritt ein, wenn der bedingte Reiz wiederholt ohne den unbedingten Reiz erscheint — die Glocke läutet, aber es gibt keine Nahrung. Die Reaktion lässt allmählich nach, doch die **Spontanerholung** zeigt: Das ursprüngliche Lernen ist nicht gelöscht, sondern lediglich überlagert. Bouton (2007) wies nach, dass Extinktion kein Löschen, sondern neues Lernen ist — die ursprüngliche Assoziation bleibt erhalten.

      **Generalisierung und Diskrimination im Alltag**

      Die **Generalisierung** führt dazu, dass ähnliche Reize die gleiche Reaktion auslösen — alle Elektro-Glocken klingen gleich bedrohlich. Die **Diskrimination** lernt der Organismus durch Differenzierung: Nur die ursprüngliche Glocke, nicht die andere, kündigt Nahrung an. Beide Prozesse sind essenziell für flexibles Überleben in komplexen Umgebungen.

      **Operante Konditionierung: Verhalten formt die Welt**

      Domjan (2014) systematisierte die Grundlage der operanten Konditionierung: Verhalten wird durch seine Konsequenzen geformt, nicht durch vorangehende Reize. Die **operante Kontingenz** beschreibt dieses Wenn-dann-Muster: Wenn ein Verhalten eine bestimmte Konsequenz hat, dann ändert sich seine Häufigkeit. Diese Konsequenzen können als **Verstärkung** die Häufigkeit erhöhen oder als **Bestrafung** sie senken.

      **Positive und negative Verstärkung im Detail**

      Bei der **positive Verstärkung** wird ein erwünschter Reiz hinzugefügt — das Klickern eines Trainers, wenn ein Hund sitzt. Bei der **negative Verstärkung** wird ein unangenehmer Reiz entfernt — der Alarm verstummt, wenn du den Gurt anlegst. Beide erhöhen die Verhaltenshäufigkeit, obwohl sie sich subjektiv völlig unterschiedlich anfühlen.

      **Verstärkerpläne: Wann wird verstärkt?**

      Domjan (2014) systematisierte die vier Haupt**Verstärkerplan**typen und ihre unterschiedlichen Wirkungen auf Verhaltensrate und -stabilität. Im Verstärkerplan entscheidet das Schema, ob jede Reaktion (kontinuierlich) oder nur ein Teil (teilweise) verstärkt wird. Teilweise Verstärkung erzeugt widerstandsstärkeres Verhalten als kontinuierliche Verstärkung — ein Phänomen, das für Suchtverhalten und Glücksspiel relevant ist.

      **Shaping: Schritt für Schritt zum Ziel**

      Das **Shaping** nutzt sukzessive Approximation: Zunächst wird jede Annäherung an das Zielverhalten verstärkt, dann nur noch genauere Ausführungen. Ein Delphin lernt so, aus dem Wasser zu springen — nicht auf einen Schlag, sondern durch viele kleine Fortschritte. Diese Technik ist fundamental für Verhaltenstherapie und Tiertraining gleichermaßen.
