  - type: "deep_dive"
    text: |-
      **Rescorlas kognitive Wendung**

      Rescorla (1988) revolutionierte das Verständnis der klassischen Konditionierung, indem er zeigte, dass der Organismus nicht einfach Reize assoziiert, sondern die vorhersagbare Struktur der Umwelt lernt. Kontingenz, nicht bloße Kontiguität, ist die entscheidende Variable.

      **Die Resistenz teilweiser Verstärkung**

      Teilweise Verstärkung erzeugt widerstandsstärkeres Verhalten als kontinuierliche Verstärkung — ein Phänomen, das für Suchtverhalten und Glücksspiel zentral ist. Domjan (2014) wies nach, dass dieses Paradoxon entsteht, weil der Organismus bei intermittierender Belohnung nie vollständig lernt, dass die Kontingenz aufgehoben wurde.

      **Extinktion als Kontext-abhängiges Lernen**

      Bouton (2007) demonstrierte, dass ausgelöschte Reaktionen in neuen Kontexten spontan wiederkehren können. Die Extinktion ist kein stabiler Zustand, sondern ein kontextsensitives Gegengewicht zur ursprünglichen Assoziation. Dies hat fundamentale Implikationen für die Verhaltenstherapie bei Ängsten und Sucht.
