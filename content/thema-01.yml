    caption: "Das Diagramm zeigt, wie die Membranspannung beim Überschreiten der Schwelle explosionsartig ansteigt und anschließend in die Refraktärzeit absinkt — die physikalische Basis der all-oder-nichts-Regel."

  - type: "explanation"
    text: |
      **Von der elektrischen zur chemischen Signalübertragung**

      Wenn das Aktionspotential die **präsynaptische Endigung** erreicht, öffnen sich dort spannungsabhängige Calciumkanäle. Ca²⁺ strömt in die Zelle und löst die Fusion von Synapsenvesikeln mit der Zellmembran aus. Darin gespeicherte **Neurotransmitter** — bei erregenden Synapsen vorwiegend **Glutamat**, bei hemmenden Synapsen vorwiegend **GABA** — werden in die **synaptische Spalt** freigesetzt (Purves et al., 2018).

      **Die Bindung an postsynaptische Rezeptoren**

      Die freigesetzten Moleküle diffundieren durch die synaptische Spalt — einen Raum von etwa 20–40 Nanometern — und binden an spezifische **postsynaptische Rezeptoren**. Diese Rezeptoren sind ebenfalls Ionenkanäle oder mit Ionenkanälen gekoppelte Proteine. Bei erregenden Synapsen öffnen sie für kurze Zeit den Weg für Na⁺, was die postsynaptische Membran depolarisiert (**exzitatorische postsynaptische Potential**, EPSP). Bei hemmenden Synapsen strömt Cl⁻ in die Zelle oder K⁺ heraus, was die Membran hyperpolarisiert (**inhibitorische postsynaptische Potential**, IPSP) (Bear et al., 2016).

      **Exzitatorisch versus inhibitorisch: Das Gleichgewicht der Erregung**

      Ob ein Neuron letztlich selbst ein Aktionspotential auslöst, hängt von der zeitlichen und räumlichen Summation aller eingehenden EPSPs und IPSPs am Axonhillock ab. Schmidt et al. (2017) betonen, dass dieses Prinzip die biologische Grundlage für jede Informationsverarbeitung im Gehirn bildet — von einfachen Reflexen bis zu höchsten kognitiven Leistungen.
    highlight_blue: ["präsynaptische Endigung", "Neurotransmitter", "Glutamat", "GABA", "synaptische Spalt", "postsynaptische Rezeptoren", "exzitatorische postsynaptische Potential", "inhibitorische postsynaptische Potential"]
    tooltips:
      präsynaptische Endigung: "Endbereich des sendenden Neurons, in dem die Signalübertragung auf die nächste Zelle vorbereitet wird — vergleichbar mit einer Werkstatt, in der die Botenstoffe verpackt und versandfertig gemacht werden."
      Neurotransmitter: "Chemische Botenstoffe, die als Brücke zwischen zwei Nervenzellen dienen und über den synaptischen Spalt hinweg Informationen weitergeben."
      Glutamat: "Haupt-erregender Neurotransmitter im zentralen Nervensystem — er schaltet die nächste Zelle gewissermaßen ein und macht sie empfänglicher für weitere Signale."
      GABA: "Haupt-hemmender Neurotransmitter im zentralen Nervensystem — er bremst die Aktivität der nachfolgenden Zelle und sorgt für Kontrolle und Balance."
      synaptische Spalt: "Winziger Zwischenraum von etwa 20–40 Nanometern zwischen zwei Nervenzellen, den die chemischen Botenstoffe überqueren müssen, um das Signal weiterzugeben."
      postsynaptische Rezeptoren: "Spezifische Ankerstellen auf der empfangenden Zelle, an denen Neurotransmitter andocken — vergleichbar mit Schlössern, für die nur bestimmte Schlüssel passen."
      exzitatorische postsynaptische Potential: "Kurzzeitige Erhöhung der Membranspannung auf der empfangenden Seite, die die Wahrscheinlichkeit erhöht, dass diese Zelle selbst ein Aktionspotential auslöst."
      inhibitorische postsynaptische Potential: "Kurzzeitige Absenkung der Membranspannung auf der empfangenden Seite, die die Wahrscheinlichkeit verringert, dass diese Zelle ein Aktionspotential auslöst."
