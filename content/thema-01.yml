subject_meta:
  title: "Aktionspotential und synaptische Transmission"
  discipline: "Biologische Psychologie / Neuropsychologie"
  difficulty: "Erstsemester-Komplexitätsgrad"
  tab_color: "#98d4bb"
  tab_number: 1

content_blocks:
  - type: "lead"
    text: "Jeder Gedanke, jedes Gefühl, jede Bewegung beginnt als elektrischer Impuls in einer Nervenzelle. Das **Aktionspotential** und die **synaptische Übertragung** bilden das biologische Fundament aller psychischen Prozesse."

  - type: "definition"
    text: "Das **Aktionspotential** ist ein kurzzeitiger, all-oder-nichts-Spannungsimpuls entlang einer Nervenfaser, der durch den gesteuerten Austausch von Natrium- und Kaliumionen über die Zellmembran zustande kommt."
    highlight_blue: ["Aktionspotential"]
    tooltips:
      Aktionspotential: "Elektrischer Nervenimpuls, der wie ein Wasserknopf funktioniert: Entweder er geht vollständig los oder gar nicht — es gibt keine halbe Stärke."

  - type: "explanation"
    text: |
      **Das Ruhepotenzial: Die Voraussetzung für jede Erregung**

      In Ruhe herrscht an der Membran eines Neurons eine elektrische Spannung von etwa −70 Millivolt. Dieses **Ruhepotenzial** entsteht, weil mehr positive Ionen außerhalb als innerhalb der Zelle vorhanden sind. Die Natrium-Kalium-Pumpe und die relative Undurchlässigkeit der Membran für geladene Teilchen halten diesen Zustand aufrecht (Schmidt et al., 2017).

      **Die Depolarisation: Der Punkt ohne Umkehr**

      Wenn ein Reiz die Membranspannung auf etwa −55 mV anhebt, öffnen sich spannungsabhängige Natriumkanäle am **Axonhillock**. Es strömt Na⁺ in die Zelle ein — die Membran depolarisiert und kippt kurzzeitig ins Positive. Dieser Moment ist der entscheidende Schritt, der das Aktionspotential unvermeidlich auslöst. Die **all-oder-nichts-Regel** besagt: Erreicht der Reiz die Schwelle, entsteht stets ein vollständiges Aktionspotential; unterschreitet er sie, passiert nichts (Bear et al., 2016).

      **Repolarisation und Refraktärzeit: Die Erholungsphase**

      Nach der Depolarisation schließen sich die Natriumkanäle, und Kaliumkanäle öffnen sich. K⁺ strömt aus der Zelle heraus, die Membran kehrt zu negativen Werten zurück — dies nennt man **Repolarisation**. Kurz darauf überschießt die Spannung kurzzeitig das Ruhepotenzial (**Hyperpolarisation**). Während der anschließenden **Refraktärzeit** ist das Neuron vorübergehend nicht oder nur schwer erregbar. Diese Phase verhindert, dass sich Impulse rückwärts ausbreiten und sichert die gerichtete Weiterleitung des Signals (Purves et al., 2018).

      **Ionenkanäle als molekulare Schalter**

      Die **Ionenkanäle** sind Proteine, die in die Zellmembran eingebettet sind und wie selektive Tore funktionieren. Hodgkin und Huxley (1952) formulierten das erste mathematische Modell dieser Kanäle und zeigten, dass der Ionenfluss präzise durch Spannungsänderungen gesteuert wird. Ihr Modell beschreibt drei Zustände: Ruhe (Kanäle geschlossen), Aktivierung (Kanäle geöffnet) und Inaktivierung (Kanäle blockiert trotz anhaltender Depolarisation).
    highlight_blue: ["Ruhepotenzial", "Depolarisation", "all-oder-nichts-Regel", "Repolarisation", "Hyperpolarisation", "Refraktärzeit", "Ionenkanäle", "Axonhillock"]
    tooltips:
      Ruhepotenzial: "Elektrische Spannung an der Nervenzellmembran im Ausgangszustand, vergleichbar mit einem aufgeladenen Akku, der auf den Auslöser wartet."
      Depolarisation: "Umkehr der Membranspannung durch Einstrom positiver Natriumionen — der Moment, in dem die Nervenzelle umschaltet von Ruhe auf Aktivität."
      all-oder-nichts-Regel: "Grundprinzip des Aktionspotentials: Entweder der Reiz überschreitet die Schwelle und ein voller Impuls entsteht, oder es passiert überhaupt nichts — wie bei einem Lichtschalter, nicht wie bei einem Dimmer."
      Repolarisation: "Rückkehr der Membranspannung zu negativen Werten durch Ausstrom von Kaliumionen — die Zelle stellt ihren Ausgangszustand wieder her."
      Hyperpolarisation: "Kurzzeitige Überschreitung des Ruhepotenzials ins Negative — die Membran wird kurz noch undurchlässiger für neue Erregung."
      Refraktärzeit: "Erholungsphase nach einem Aktionspotential, in der die Nervenzelle vorübergehend nicht oder nur schwer ein neues Signal auslösen kann — vergleichbar mit der Nachladezeit einer Kamera."
      Ionenkanäle: "Spezialisierte Proteine in der Zellmembran, die wie selektive Schleusen geladene Teilchen passieren lassen, aber nur bei bestimmten Bedingungen."
      Axonhillock: "Enger Übergangsbereich zwischen Zellkörper und Axon, an dem die Entscheidung fällt, ob ein Aktionspotential ausgelöst wird — der Schaltkreis des Neurons."
