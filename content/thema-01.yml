  - type: "deep_dive"
    text: |
      **Hodgkin-Huxley-Modell: Die mathematische Grundlage**

      Hodgkin und Huxley (1952) entwickelten ein System von vier gekoppelten Differentialgleichungen, das den Zustand der Natrium- und Kaliumkanäle als Funktion der Membranspannung beschreibt. Dieses Modell erklärt nicht nur die Form des Aktionspotentials, sondern auch die Refraktärzeit und die Leitungsgeschwindigkeit entlang markhaltiger versus unmarkhaltiger Axone. Es gilt bis heute als Paradebeispiel für die mathematische Modellierung biologischer Prozesse und wurde 1963 mit dem Nobelpreis für Physiologie oder Medizin gewürdigt.

      **Kritische Nuancen: Modifikationen des Grundmodells**

      Purves et al. (2018) weisen darauf hin, dass das Hodgkin-Huxley-Modell am riesigen Axon des Tintenfischs kalibriert wurde und an menschlichen Neuronen Abweichungen zeigt. Moderne Erweiterungen berücksichtigen zusätzliche Ionenkanäle, intrazelluläre Signalkaskaden und die räumliche Verteilung von Kanälen entlang des Dendritenbaums. Dennoch bleibt das Grundprinzip — spannungsabhängige Kanäle erzeugen ein selbstverstärkendes Depolarisationsereignis — für alle erregbaren Zellen gültig.
