subject_meta:
  title: "Signifikanztestung, p-Werte und Alpha-/Beta-Fehler"
  discipline: "Statistik / Methodenlehre"
  difficulty: "Erstsemester-Komplexitätsgrad"
  tab_color: "#ffe6a7"
  tab_number: 10

content_blocks:
  - type: "lead"
    text: "Ein Medikament wird als 'wirksam' verkauft, weil p < .05 — doch der Effekt ist minimal und die Studie wurde nur einmal durchgeführt. Signifikanz ist kein Siegel für Wahrheit, sondern ein Werkzeug mit scharfen Kanten. Wer die Logik dahinter nicht versteht, lässt sich von Zahlen täuschen."

  - type: "definition"
    text: "Die **Signifikanztestung** prüft, wie wahrscheinlich ein beobachtetes Ergebnis ist, wenn in Wahrheit kein Effekt existiert. Der **p-Wert** quantifiziert diese Wahrscheinlichkeit — er ist kein Maß für Effektgröße oder Wahrscheinlichkeit der Hypothese."
    highlight_blue:
      - "Signifikanztestung"
      - "p-Wert"
    tooltips:
      Signifikanztestung: "Ein statistisches Verfahren, das prüft, ob ein beobachteter Effekt so ungewöhnlich ist, dass er sich kaum durch Zufall erklären lässt — nicht ob die Hypothese wahr ist."
      p-Wert: "Die Wahrscheinlichkeit, das beobachtete Ergebnis (oder ein extremeres) zu erhalten, wenn die Nullhypothese wahr ist — kein Maß für die Größe oder Wichtigkeit eines Effekts."

  - type: "explanation"
    text: |
      ### Das logische Grundgerüst: Zwei sich ausschließende Hypothesen

      Jeder Signifikanztest beginnt mit zwei rivalisierenden Behauptungen. Die **Nullhypothese** (H₀) postuliert, dass es keinen Unterschied und keinen Zusammenhang gibt — der neue Schlaftrunk wirkt nicht besser als Wasser. Die **Alternativhypothese** (H₁) behauptet das Gegenteil: Es gibt einen Effekt, eine Differenz, einen Zusammenhang.

      Das Experiment sammelt Daten, um zu entscheiden, ob die Evidenz stark genug ist, H₀ zu verwerfen.

      ### Der p-Wert als Zufallsbarometer — nicht als Wahrscheinlichkeitsmesser

      Der **p-Wert** sagt: „Wenn H₀ wahr ist, wie wahrscheinlich ist es, dieses Ergebnis (oder ein extremeres) durch Zufall zu erhalten?“ Ein p-Wert von .03 bedeutet nicht, dass die Alternativhypothese zu 97 % wahr ist. **Cohen (1994)** kritisierte genau diesen ritualisierten Missbrauch: Forscher behandelten p < .05 als magische Grenze zwischen Wahrheit und Falschheit, obwohl der p-Wert nur die Inkonsistenz mit H₀ misst, nicht die Plausibilität von H₁.

      Das **Signifikanzniveau** (α) wird vor dem Test festgelegt — meist auf 5 %. Es ist die Toleranzschwelle für den **Fehler 1. Art**: die fälschliche Verwerfung einer wahren Nullhypothese. Man sieht einen Effekt, wo in Wahrheit keiner existiert.

      ### Der Fehler 2. Art: Wenn wahre Effekte unsichtbar bleiben

      Der **Fehler 2. Art** ist das Gegenteil: Man behält H₀ bei, obwohl H₁ wahr ist. Man übersieht einen tatsächlich vorhandenen Effekt. Die Wahrscheinlichkeit dafür nennt man β.

      ### Teststärke: Die Wahrscheinlichkeit, einen wahren Effekt zu finden

      Die **Teststärke** (1 − β) gibt an, wie wahrscheinlich es ist, einen wahren Effekt auch tatsächlich zu entdecken. Teststärke hängt von drei Faktoren ab: dem **Signifikanzniveau** (strengeres α verringert Fehler 1. Art, aber erhöht β), der **Effektstärke** (größere Effekte sind leichter zu finden) und der Stichprobengröße (mehr Personen reduzieren Rauschen).

      ### Effektstärke: Wie groß ist der Unterschied wirklich?

      Der p-Wert allein ist blind für die Größe eines Effekts. Die **Effektstärke** — etwa Cohens d oder Pearson r — standardisiert den Unterschied und macht ihn vergleichbar. Ein Medikament kann „signifikant“ wirken, weil es in einer riesigen Stichprobe getestet wurde, obwohl der klinische Nutzen minimal ist.

      ### Konfidenzintervall: Unsicherheit transparent machen

      Das **Konfidenzintervall** ergänzt dies: Es gibt einen Bereich an, in dem der wahre Parameter mit einer festgelegten Wahrscheinlichkeit (meist 95 %) liegt. Es zeigt Schätzunsicherheit und Effektgröße zugleich — und ist transparenter als ein isolierter p-Wert.
