  - type: "deep_dive"
    text: |
      ### Cohens Kritik und die Zeremonie des Signifikanztestens

      **Cohen (1994)** titelte sein berühmtes Papier „The earth is round (p < .05)“ — ein ironischer Verweis darauf, dass Forscher Signifikanz als Evidenz für eine wahre Behauptung missverstehen. Er wies nach, dass der p-Wert die a-posteriori-Wahrscheinlichkeit der Hypothese nicht liefert und dass die übliche Praxis, Signifikanz als „bewiesen“ zu werten, zu publizierten Artefakten führt. Cohen plädierte für die Berichterstattung von Effektstärken und Konfidenzintervallen statt für p-Wert-Ritualismus.

      ### Die Replikationskrise als empirisches Erdbeben

      **Die Open Science Collaboration (2015)** publizierte die bislang größte Replikationsstudie der Psychologie: Von 100 Befunden hochrangiger Journale konnten nur 36 % erfolgreich repliziert werden. Die durchschnittliche Effektstärke der Replikationen lag auf etwa der Hälfte der Originalstudien. Dieses Ergebnis zeigt, dass p-Wert-Signifikanz allein keine Garantie für robuste Erkenntnis ist — sie entsteht oft durch Methodenflexibilität (p-Hacking), selektive Berichterstattung und unterpowered Studien.

      ### Die ASA-Erklärung und die Zukunft der Berichterstattung

      **Wasserstein und Lazar (2016)** verfassten im Namen der American Statistical Association ein Statement, das sechs Prinzipien zum verantwortungsvollen Umgang mit p-Werten formulierte. Zentrale Botschaft: p-Werte zeigen die Inkonsistenz der Daten mit einem spezifischen Modell, nicht die Wahrscheinlichkeit, dass die Hypothese wahr ist. Sie plädierten für Transparenz, vollständige Berichterstattung und den Einsatz alternativer Analysemethoden — darunter Bayesianische Statistik und registered reports, bei denen die Analyseplanung vor Datenerhebung erfolgt.
