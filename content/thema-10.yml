  - type: "example"
    text: "Du wirfst eine Münze zehnmal und erhältst achtmal Kopf — der p-Wert liegt bei etwa .05, knapp signifikant. Doch die Effektstärke ist winzig, die Stichprobe zu klein, und ein Fehler 1. Art wäre wahrscheinlich. Signifikanz allein rechtfertigt nicht den Verdacht auf eine gezinkte Münze — Kontext und Replikation zählen."

  - type: "summary"
    text: |
      • Der p-Wert misst die Wahrscheinlichkeit der Daten unter H₀ — nicht die Wahrscheinlichkeit, dass H₁ wahr ist.
      • Fehler 1. Art und Fehler 2. Art balancieren wie auf einer Wippe; nur mehr Stichprobe oder weniger striktes α senkt beide zugleich.
      • Effektstärke und Konfidenzintervall liefern mehr Information als ein isolierter p-Wert — besonders nach Cohens Kritik und der Replikationskrise.

