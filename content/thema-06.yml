subject_meta:
  title: "Kognitive Entwicklung nach Piaget"
  discipline: "Entwicklungspsychologie"
  difficulty: "Erstsemester-Komplexitätsgrad"
  tab_color: "#f4b8c5"
  tab_number: 6

content_blocks:
  - type: "lead"
    text: "Warum begreift ein Dreijähriges, dass ein verborgener Gegenstand nicht verschwunden ist, aber ein Zweijähriges nicht? Piagets Stufentheorie erklärt, wie Kinder Schritt für Schritt zu komplexeren Denkformen gelangen."

  - type: "definition"
    text: "Die kognitive Entwicklung nach Piaget beschreibt den qualitativen Wandel des Denkens vom Säugling bis zum Erwachsenen durch vier aufeinanderfolgende Stadien, die durch biologische Reifung und Umwelterfahrung vorangetrieben werden."
    highlight_blue: ["kognitive Entwicklung", "Stadien", "Reifung"]
    tooltips:
      kognitive Entwicklung: "Die Veränderung von Denk-, Wahrnehmungs- und Lernfähigkeiten im Laufe der Kindheit und Adoleszenz — nicht nur mehr Wissen, sondern bessere Denkwerkzeuge."
      Stadien: "Abgrenzbare Entwicklungsphasen mit eigenen Denkstrukturen; jede Stufe baut auf der vorherigen auf und ersetzt deren Denkformen qualitativ."
      Reifung: "Die biologische Heranreife des Nervensystems und des Gehirns, die Piaget als Motor der kognitiven Veränderung sah — unabhängig von Übung allein."

  - type: "explanation"
    text: |
      **Kernidee: Kinder sind keine kleinen Erwachsenen, sondern Denker mit eigenen Gesetzen.**

      Piaget (1970) verstand kognitive Entwicklung als Konstruktionsprozess. Das Kind baut aktiv **Schemata** auf — innere Baupläne für Wahrnehmung und Handlung. Wenn ein neues Erlebnis zu einem vorhandenen Schema passt, geschieht **Assimilation**. Passt es nicht, muss das Schema erweitert oder verändert werden: das ist **Akkommodation**. Beide Prozesse zusammen erzeugen **Äquilibration** (Gleichgewicht), den Rückkopplungsmechanismus, der die Entwicklung von einer Stufe zur nächsten treibt.

      ### Das sensorimotorische Stadium (0–2 Jahre)

      Das Neugeborene erlebt die Welt durch Greifen, Saugen, Schauen. Das zentrale kognitive Merkmal dieser Phase ist die fehlende **Objektpermanenz**: solange ein Gegenstand nicht sichtbar ist, existiert er für das Kind nicht. Erst gegen Ende dieser Phase entwickelt das Kind die Fähigkeit, sich ein inneres Bild von verborgenen Objekten zu machen. Montada (2005) betont, dass diese Errungenschaft die Basis aller späteren Symbolverwendung bilde.

      ### Das präoperationale Stadium (2–7 Jahre)

      Das Kind beginnt, Sprache und Symbole zu nutzen. Allerdings bleibt das Denken noch zentriert auf eine einzige Dimension. Das Kind zeigt **Egosentrizismus**: es kann die Welt nicht aus der Perspektive eines anderen betrachten. **Konservierung** — die Einsicht, dass eine Menge gleich bleibt, auch wenn ihre äußere Form sich ändert — ist noch nicht vorhanden. Das klassische Beispiel: zwei gleich große Gläsern mit Wasser — eins wird in ein hohes, dünnes Glas umgegossen. Das Kind meint, nun sei mehr Wasser da, weil es nur die Höhe, nicht die Breite berücksichtigt.

      ### Das konkret-operationale Stadium (7–11 Jahre)

      Die Schule öffnet neue kognitive Möglichkeiten. Das Kind beherrscht jetzt logische Operationen, aber nur bei greifbaren, konkreten Gegenständen. Es erkennt, dass die Wassermenge beim Umgießen gleich bleibt (**Dekonservierung**). Es kann Seriationen bilden, Klassen einteilen und Beziehungen reversibel denken — aber abstrakte Hypothesen ohne materiellen Bezugspunkt bleiben unzugänglich.

      ### Das formal-operationale Stadium (ab 11 Jahre)

      Der Jugendliche denkt nun auch hypothetisch-deduktiv. Er kann von einer Annahme ausgehen und deren Konsequenzen durchspielen, ohne dass die Situation real vorliegt. Formale Logik, Kombinatorik und propositionalales Denken werden zugänglich. Nicht jeder Erwachsene erreicht dieses Stadium in allen Bereichen vollständig; Piaget selbst räumte ein, dass Alltagskontexte die Stufenfolge modifizieren können.

      **Schemata, Assimilation und Akkommodation als Motor der Entwicklung**

      Piagets Theorie ist konstruktivistisch: Wissen entsteht durch aktive Auseinandersetzung mit der Umwelt, nicht durch passives Aufsaugen. Ein Baby hat ein Sau-Schema. An der Mutterbrust funktioniert es perfekt (Assimilation). Am Spielzeugtau funktioniert es nicht — das Kind muss das Schema modifizieren (Akkommodation). Dieses ständige Wechselspiel treibt die Entwicklung voran.
    highlight_blue: ["Schemata", "Assimilation", "Akkommodation", "Äquilibration", "Objektpermanenz", "Egosentrizismus", "Konservierung", "Dekonservierung"]
    highlight_red: ["Piaget (1970) verstand kognitive Entwicklung als Konstruktionsprozess", "Montada (2005) betont, dass diese Errungenschaft die Basis aller späteren Symbolverwendung bilde", "Piaget selbst räumte ein, dass Alltagskontexte die Stufenfolge modifizieren können"]
    tooltips:
      Schemata: "Mentale Baupläne oder Grundgerüste, die das Kind für wiederkehrende Situationen im Kopf speichert — wie eine innere Checkliste für 'Was mache ich, wenn ich einen Gegenstand greife?'"
      Assimilation: "Das Einordnen neuer Erfahrungen in bereits vorhandene Denkstrukturen, ohne diese zu verändern — wie das Einordnen eines neuen Apfels in das Schema 'Obst'."
      Akkommodation: "Das Anpassen und Erweitern eigener Denkstrukturen, wenn eine neue Erfahrung nicht hineinpasst — das Schema 'Obst' muss erweitert werden, wenn das Kind zum ersten Mal eine Kiwi sieht."
      Äquilibration: "Der Ausgleichsprozess zwischen Assimilation und Akkommodation, der das Denken immer wieder ins Gleichgewicht bringt und zur nächsten Entwicklungsstufe führt."
      Objektpermanenz: "Die Erkenntnis, dass Gegenstände auch dann weiterexistieren, wenn sie nicht mehr sichtbar sind — ein Meilenstein des ersten Lebensjahres."
      Egosentrizismus: "Die Unfähigkeit des kleinen Kindes, sich in die Sichtweise eines anderen Menschen hineinzuversetzen; das eigene Erleben erscheint als einzig mögliche Realität."
      Konservierung: "Die Einsicht, dass bestimmte Größen (Menge, Zahl, Volumen) gleich bleiben, auch wenn ihre äußere Gestalt sich verändert."
      Dekonservierung: "Die Bezeichnung für den Erwerb des Konservierungsverständnisses — das Kind 'ent-konserviert' seinen bisherigen Irrtum und erkennt die Erhaltung."
    sources_inline:
      "Piaget (1970) verstand kognitive Entwicklung als Konstruktionsprozess": "Piaget, J. (1970). Science of education and the psychology of the child (Übers. D. Coltman). Orion Press. (Original 1965)"
      "Montada (2005) betont, dass diese Errungenschaft die Basis aller späteren Symbolverwendung bilde": "Montada, L. (Hrsg.). (2005). Entwicklungspsychologie (6. Aufl.). Beltz PVU."
      "Piaget selbst räumte ein, dass Alltagskontexte die Stufenfolge modifizieren können": "Piaget, J. (1970). Science of education and the psychology of the child (Übers. D. Coltman). Orion Press. (Original 1965)"

