  - type: "deep_dive"
    text: |
      **Kontroverse: Sind Piagets Stadien universell?**

      Siegler und Ellis (1996) prägten das Bild vom 'kompetenten Säugling': Neugeborene zeigen bereits früher als Piaget annahm Ansätze von Objektpermanenz — allerdings in vereinfachter Form. Lourenço und Machado (1996) verteidigten Piaget gegen die gängigsten zehn Kritikpunkte. Sie argumentieren, dass viele 'Widerlegungen' Piagets tatsächliche Positionen missverstehen. Das Modell sei ein Strukturmodell, kein Leistungsmodell: Ein Kind kann situativ mehr zeigen als seine Stufe vorsieht, ohne die zugrundeliegende Denkstruktur zu besitzen.

      **Das Problem der Horizontalen Dekalage**

      Piaget beobachtete selbst, dass Kinder Konservierung in einer Domäne (z. B. Flüssigkeit) früher erreichen als in einer anderen (z. B. Masse). Diese 'stufenübergreifende Unschärfe' widerspricht nicht dem Modell, sofern die grundsätzliche Stufenfolge erhalten bleibt. Allerdings zeigte sich in Kulturvergleichsstudien, dass formale Operationen nicht in allen Gesellschaften gleich ausgeprägt sind — ein Hinweis darauf, dass Umwelt und Bildungssystem die Stufenfolge beschleunigen oder verzögern können.
    highlight_red: ["Siegler und Ellis (1996) prägten das Bild vom 'kompetenten Säugling'", "Lourenço und Machado (1996) verteidigten Piaget gegen die gängigsten zehn Kritikpunkte"]
    sources_inline:
      "Siegler und Ellis (1996) prägten das Bild vom 'kompetenten Säugling'": "Siegler, R. S., & Ellis, S. (1996). Piaget on childhood. Psychological Science, 7(4), 211–215. https://doi.org/10.1111/j.1467-9280.1996.tb00363.x"
      "Lourenço und Machado (1996) verteidigten Piaget gegen die gängigsten zehn Kritikpunkte": "Lourenço, O., & Machado, A. (1996). In defense of Piaget's theory: A reply to 10 common criticisms. Psychological Review, 103(1), 143–164. https://doi.org/10.1037/0033-295X.103.1.143"

  - type: "example"
    text: "Stell dir eine fünfjährige deutsche Kita-Gruppe beim Backen vor. Die Erzieherin rollt zwei gleich große Kugeln Teig — eine flach, eine lang. 'Ist das gleich viel?' fragt sie. Das Kind zeigt auf die lange Teigrolle: 'Da ist mehr!' Es ist zentriert auf die Länge, ignoriert die Dicke. Ein konkret-operational denkendes Achtjähriges würde antworten: 'Ist gleich viel, du hast es nur umgeformt.' Und ein Jugendlicher würde hinzufügen: 'Selbst wenn wir es anders formen, bleibt das Volumen erhalten — denn die Masse bleibt konstant, solange nichts hinzukommt oder entfernt wird.' Dasselbe Teigstück, drei Denkwelten."

  - type: "summary"
    text: |
      - Piaget beschrieb vier qualitative Stufen kognitiver Entwicklung, die durch Assimilation, Akkommodation und Äquilibration vorangetrieben werden.
      - Jedes Stadium hat eigene Denkgesetze: Objektpermanenz erst im Sensorimotorium, Konservierung erst im Konkret-Operationalen, hypothetisches Denken erst im Formal-Operationalen.
      - Die Kritik betrifft vor allem das Stufengerüst selbst — doch das Grundmodell des aktiven Wissenskonstrukteurs bleibt in der Entwicklungspsychologie präsent.

