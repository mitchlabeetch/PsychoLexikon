subject_meta:
  title: "Attributionstheorie"
  discipline: "Sozialpsychologie / Motivationspsychologie"
  difficulty: "Erstsemester-Komplexitätsgrad"
  tab_color: "#a8d8ea"
  tab_number: 7

content_blocks:
  - type: "lead"
    text: "Warum antwortet dein:e Freund:in nicht auf deine Nachricht? Die Attributionstheorie erklärt, wie Menschen Ursachen für Verhalten zuschreiben – und wie diese Zuschreibungen Gefühle, Motivation und zwischenmenschliche Beziehungen steuern."

  - type: "definition"
    text: "Attribution ist der kognitive Prozess, durch den Menschen Erklärungen für eigenes und fremdes Verhalten generieren. Das Modell von Weiner ordnet Ursachen entlang dreier Dimensionen: Locus, Stabilität und Kontrollierbarkeit. Diese Dimensionen bestimmen, welche Emotionen und Handlungsbereitschaften entstehen."
    highlight_blue: ["Attribution", "Locus", "Stabilität", "Kontrollierbarkeit"]
    tooltips:
      Attribution: "Wenn du dir erklärst, warum jemand so handelt – etwa ob die schlechte Note auf Faulheit oder eine schwere Prüfung zurückgeht"
      Locus: "Die Unterscheidung, ob eine Ursache in der Person selbst liegt (Fähigkeit) oder außerhalb (Pech)"
      Stabilität: "Die Frage, ob eine Ursache dauerhaft besteht (Intelligenz) oder vorübergehend ist (Krankheit)"
      Kontrollierbarkeit: "Das Maß, in dem man eine Ursache willentlich beeinflussen kann (Lernen ja, Wetter nein)"

  - type: "explanation"
    text: |
      **Heiders naive Psychologie: Die Wurzeln der Ursachensuche**

      Menschen sind intuitive Psychologen. Heider (1958) argumentierte, dass Alltagsmenschen systematisch Ursachen für Verhalten suchen, um ihre soziale Umwelt vorhersagbar zu machen. Diese spontane Ursachenzuschreibung nennt er Attribution.

      Heider (1958) unterschied interne Ursachen wie Fähigkeiten und Einstellungen von externen Ursachen wie Situationsdruck oder Zufall. Ein Beobachter muss entscheiden, ob das Durchfallen bei einer Prüfung auf mangelnde Fähigkeit oder eine zu schwere Aufgabe zurückzuführen ist. Diese Dichotomie bildet den Kern aller späteren Attributionstheorien.

      Försterling (2001) systematisiert neben Heiders Modell auch Kelleys Kovariationsprinzip. Dieses besagt, dass Menschen Ursachen anhand dreier Informationen ableiten: Konsens, Distinktheit und Konsistenz. Werden alle drei Kriterien erfüllt, erfolgt eine externe Attribution; bei niedrigem Konsens und niedriger Distinktheit eine interne.

      **Weiners dreidimensionales Modell: Locus, Stabilität, Kontrollierbarkeit**

      Weiner (1986) erweiterte Heiders Dichotomie zu einem dreidimensionalen System. Ursachen lassen sich entlang der Dimensionen Locus (intern vs. extern), Stabilität (stabil vs. instabil) und Kontrollierbarkeit (kontrollierbar vs. unkontrollierbar) klassifizieren. Fähigkeit ist intern, stabil und unkontrollierbar; Anstrengung ist intern, instabil und kontrollierbar.

      Diese drei Dimensionen generieren spezifische Emotionen und Handlungsbereitschaften. Misserfolg, der auf interne, stabile, unkontrollierbare Ursachen zurückgeführt wird, löst Scham aus und reduziert die zukünftige Anstrengung. Erfolg, der auf interne, stabile Ursachen attribuiert wird, erzeugt Stolz und fördert die Persistenz.

      Selbstwertdienliche Attribution zeigt sich darin, dass Menschen Erfolg eher intern und Misserfolg eher extern zuschreiben. Dieser Bias schützt das Selbstwertgefühl, ist jedoch in seiner Extremform realitätsverzerrend. Försterling (2001) ordnet diesen Effekt in die Kategorie motivationaler Verzerrungen ein.

      **Der fundamentale Attributionfehler: Systematische Fremdeinschätzung**

      Der fundamentale Attributionfehler beschreibt die systematische Tendenz, das Verhalten anderer stärker auf deren Persönlichkeit als auf die Situation zurückzuführen. Försterling (2001) zeigt, dass dieser Fehler besonders bei negativem Verhalten fremder Personen auftritt. Dagegen erklären Menschen ihr eigenes Verhalten eher situationsbedingt.

      Dieser Unterschied zwischen Eigen- und Fremdperspektive ist eine der robustesten Befunde der Sozialpsychologie. Er erklärt, warum Beobachter den Fahrer eines überholenden Autos als aggressiv einschätzen, während der Fahrer selbst eine Notlage anführt. Die asymmetrische Informationslage ist ein verbreiteter Erklärungsansatz.

      **Attributionaler Stil und gelernte Hilflosigkeit**

      Der attributionale Stil bezeichnet relativ stabile Neigungen, bestimmte Ursachenmuster zu bevorzugen. Ein pessimistischer attributionaler Stil führt Misserfolg auf interne, stabile, globale Ursachen zurück und begünstigt depressive Symptome. Graham und Folkes (1990) wenden die Attributionstheorie auf schulisches Leistungsverhalten und psychische Gesundheit an.

      Graham und Folkes (1990) zeigen in ihrem Review, dass attributionale Retraining-Programme bei Lernenden mit Hilflosigkeitsmustern die Leistungsmotivation steigern können. Durch Umstrukturierung der Ursachenzuschreibung wird eine instabile, kontrollierbare Attribution gefördert. Diese Intervention ist besonders wirksam bei Kindern mit Lernschwierigkeiten.
