  - type: "example"
    text: |
      **Alltagsbeispiel: Die verpasste Prüfungsanmeldung**

      Du hast die Anmeldefrist für eine Klausur verpasst. Deine Attribution bestimmt deine Reaktion: Schreibst du dem Prüfungsamt (externe, instabile Ursache: "Das System war unübersichtlich") oder verfällst du in Selbstvorwürfe (interne, stabile Ursache: "Ich bin chaotisch")?

      Die erste Attribution führt zu Ärger und Korrekturversuchen, die zweite zu Scham und Vermeidung. Weiners Modell erklärt, warum dieselbe Situation bei verschiedenen Personen unterschiedliche Emotionen und Handlungsbereitschaften auslöst.

      Ein pessimistischer attributionale Stil würde den Fehler verallgemeinern: "Ich versage immer bei organisatorischen Dingen." Ein optimistischer Stil hingegen attributiert spezifisch und variabel: "Dieses Semester war die Anmeldephase ungewöhnlich früh." Die unterscheidliche Zukunftserwartung ist der entscheidende Motivationshebel.

  - type: "summary"
    text: |
      • Attribution ist die kognitive Zuschreibung von Ursachen für Verhalten; sie strukturiert unser soziales Verstehen.
      • Weiners drei Dimensionen (Locus, Stabilität, Kontrollierbarkeit) verbinden Attribution mit spezifischen Emotionen und Motivation.
      • Der fundamentale Attributionfehler und der attributionale Stil erklären systematische Verzerrungen in der Alltagspsychologie.

