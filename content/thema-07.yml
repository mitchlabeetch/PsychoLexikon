  - type: "deep_dive"
    text: |
      **Das Akteur-Beobachter-Problem und seine Auflösung**

      Das Akteur-Beobachter-Asymmetrie beschreibt, dass Handelnde ihre Taten situativ erklären, während Beobachtende dispositionale Attributionen bevorzugen. Försterling (2001) systematisiert die Erklärungsansätze für diesen Effekt, darunter die unterschiedliche Informationslage und die unterschiedliche Wahrnehmungsperspektive. Die Asymmetrie ist somit kein kognitiver Automatismus, sondern durch Informationsstand und Motivation moderiert.

      **Grenzen der Attributionstheorie**

      Kritiker werfen dem Ansatz eine übermäßige Kognitivierung sozialen Verhaltens vor. Emotionale und implizite Prozesse werden in klassischen Attributionstheorien unterrepräsentiert. Weiners Modell bleibt dennoch das dominante Rahmenwerk für interventionsbasierte Forschung in Bildung und Klinischer Psychologie.
    highlight_red:
      - "Försterling (2001) systematisiert die Erklärungsansätze für diesen Effekt, darunter die unterschiedliche Informationslage und die unterschiedliche Wahrnehmungsperspektive"
