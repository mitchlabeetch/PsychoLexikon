  - type: "example"
    text: |
      Eine österreichische Studentin bereitet sich auf eine Statistikprüfung vor. **Intrinsisch motiviert** liest sie aus Interesse an Zahlenmustererkennung; **extrinsisch motiviert** aus Angst vor Studienabbruch. Wenn sie die Klausur besteht, empfindet sie Freude — aber ob diese Freude zuerst als Körperreaktion (Herzrasen) oder als kognitive Bewertung ("Ich habe es geschafft!") entsteht, hängt von der theoretischen Linse ab. In Japan würde sie ihre Freude möglicherweise zurückhaltender zeigen als in Italien — die **Display Rules** ihrer Kultur modulieren den Ausdruck, nicht aber die Basisemotion selbst.

  - type: "summary"
    text: |
      - Motivation erklärt das Warum des Verhaltens, Emotion bewertet dessen Bedeutung — beide sind funktional untrennbar.
      - Intrinsische Motivation entsteht aus befriedigten Grundbedürfnissen; extrinsische Anreize können sie untergraben oder internalisieren.
      - Emotionen erfordern körperliche Erregung und kognitive Bewertung, doch ihre kausale Reihenfolge bleibt theoretisch kontrovers.

