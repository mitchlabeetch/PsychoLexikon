subject_meta:
  title: "Theorien der Motivation und Emotion"
  discipline: "Motivations- und Emotionspsychologie"
  difficulty: "Erstsemester-Komplexitätsgrad"
  tab_color: "#d4a8a8"
  tab_number: 12

content_blocks:
  - type: "lead"
    text: |
      Warum lernt jemand drei Stunden Klavier, ohne dass ein Prüfer zuschaut — während ein anderer erst bei Drohung mit schlechter Note anfangen will? Motivation und Emotion sind zwei Seiten derselben adaptiven Medaille: Sie steuern Zielverhalten und bewerten seine Bedeutung für das Überleben. Beide Prozesse verbinden Körper und Geist mit der sozialen Umwelt.

  - type: "definition"
    text: |
      **Motivation** (Verhaltensantrieb) erklärt die Richtung, Intensität und Persistenz menschlichen Handelns. **Emotion** (affektive Bewertung) ist ein kurzzeitiger, multidimensionaler Zustand aus subjektivem Erleben, physiologischer Aktivierung und Ausdrucksverhalten. Beide Prozesse sind funktional miteinander verwoben: Emotionen signalisieren Bedeutung, Motivationen kanalisieren Reaktionen.
    highlight_blue:
      - "Motivation"
      - "Emotion"
    tooltips:
      Motivation: "Innerer oder äußerer Antrieb, der die Auswahl, Intensität und Dauer eines Verhaltens bestimmt — das Warum hinter dem Handeln."
      Emotion: "Kurzzeitiger, ganzheitlicher Zustand aus Körperreaktion, subjektivem Erleben und Ausdrucksverhalten, der die Bedeutung einer Situation bewertet."

  - type: "explanation"
    text: |
      ### Intrinsische und extrinsische Motivation

      **Intrinsische Motivation** (inneres Interesse) bezeichnet Handeln, das um seiner selbst willen ausgeführt wird. **Extrinsische Motivation** (äußerer Anreiz) entsteht durch erwartete Belohnungen, Drohungen oder soziale Anerkennung. **Heckhausen und Heckhausen (2010)** zeigen, dass übermäßige extrinsische Kontrolle intrinsisches Interesse systematisch untergraben kann.

      ### Selbstbestimmungstheorie: Autonomie als Kernbedürfnis

      Die **Selbstbestimmungstheorie** (Self-Determination Theory, SDT) von Deci und Ryan identifiziert drei universelle psychologische Grundbedürfnisse: Autonomie, Kompetenz und soziale Eingebundenheit (Heckhausen & Heckhausen, 2010). Befriedigte Grundbedürfnisse fördern intrinsische Motivation und psychisches Wohlbefinden. Bedrohte Bedürfnisse führen zu kontrolliertem Handeln und reduzierter Leistungsqualität.

      ### Leistungsmotivation: Anspruch und Vermeidung

      Die **Leistungsmotivation** umfasst zwei konfligierende Tendenzen: die Hoffnung auf Erfolg und die Furcht vor Misserfolg (Heckhausen & Heckhausen, 2010). Atkinson modellierte die resultierende Tendenz als algebraische Funktion aus Motivstärke, Erfolgserwartung und Incentive-Wert. Hohe Furcht vor Misserfolg kann paradoxerweise zur Vermeidung herausfordernder Aufgaben führen, auch wenn Erfolg wahrscheinlich wäre.

      ### Historische Einordnung: Maslows Hierarchie

      Maslows Bedürfnishierarchie bleibt populärkulturell präsent, hat aber empirisch kaum Bestand. Die pyramidenförmige Abfolge von physiologischen über Sicherheits- und soziale Bedürfnisse bis hin zu Selbstverwirklichung ist nicht als streng sequentiell bestätigt (Rheinberg, 2008). Sie dient heute vor allem als heuristisches Einstiegsmodell, nicht als theoretisch fundierte Theorie.

      ### Emotionstheorien: Körper und Bewusstsein

      Emotionstheorien streiten um die kausale Reihenfolge von Körperreaktion und subjektivem Erleben. Die klassischen Positionen bilden ein Kontinuum von somatischer Dominanz bis kognitiver Kontrolle. **Rheinberg (2008)** ordnet diese Theorien nach dem Grad der Einflussnahme von Physiologie und Kognition.

      ### James-Lange: Der Körper fühlt zuerst

      Die **James-Lange-Theorie** besagt, dass Emotionen aus der wahrgenommenen körperlichen Reaktion auf ein Ereignis entstehen. Wir weinen nicht, weil wir traurig sind — wir sind traurig, weil wir weinen (Rheinberg, 2008). Diese rein somatische Erklärung wurde durch den Nachweis kausaler Hirnprozesse unabhängig von Körperfeedback modifiziert.

      ### Cannon-Bard: Gleichzeitige Aktivierung

      Die **Cannon-Bard-Theorie** postuliert, dass physiologische Erregung und emotionales Erleben unabhängig und gleichzeitig vom Thalamus ausgelöst werden. Ein und dasselbe Ereignis aktiviert somit parallel den Körper und das Bewusstsein. Diese Theorie widerlegte die Annahme, dass jede Emotion eine einzigartige körperliche Signatur besitzt.

      ### Zwei-Faktoren-Theorie: Kognition konstruiert Emotion

      Die **Zwei-Faktoren-Theorie** (Schachter-Singer) führt Emotionen auf die kognitive Interpretation unspezifischer körperlicher Erregung zurück. Derselbe physiologische Zustand kann als Wut, Freude oder Angst erlebt werden, je nachdem, welcher Umweltkontext zur Attribution herangezogen wird (Rheinberg, 2008). Die Theorie betont die informationsverarbeitende Rolle des Individuums bei der Emotionsentstehung.

      ### Appraisal-Theorien: Bewertung vor Emotion

      Die **Appraisal-Theorien** (Bewertungstheorien) vertreten die zentrale Annahme, dass Emotionen durch die kognitive Bewertung eines Ereignisses entstehen. **Scherer (in Scherer et al., 2001)** entwickelte ein komponentenprozessmodell, das multiple sequentielle Prüfungen wie Neuheit, innere Konkordanz und Zielrelevanz vorschlägt. Diese Theorie erklärt, warum dieselbe Situation bei verschiedenen Personen unterschiedliche Emotionen auslöst.

      ### Basisemotionen und universelle Ausdrücke

      **Basisemotionen** (Grundemotionen) sind nach **Ekman (1992)** evolutionär präparierte, universelle Affektprogramme. Er identifizierte Freude, Trauer, Wut, Angst, Ekel und Überraschung als kulturell unabhängige emotionale Grundmuster, die durch charakteristische mimische Ausdrücke erkennbar sind. Cross-kulturelle Studien bestätigten die hohe Erkennungsrate dieser Basisausdrücke selbst in visuell isolierten Gesellschaften (Ekman, 1992).

      ### Display Rules: Kulturelle Maskierung

      **Display Rules** (Ausdrucksregeln) sind kulturspezifische Normen, die steuern, wann, wie und gegenüber wem emotionale Ausdrücke gezeigt werden dürfen. **Ekman (1992)** differenzierte zwischen universellen Emotionsprogrammen und kulturvariablen Ausdrucksregeln. In manchen Kulturen ist öffentliche Trauer erwünscht, in anderen als Schwäche stigmatisiert — die zugrundeliegende Emotion bleibt dennoch identisch.
