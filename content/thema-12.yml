    svg_description: |
      Clean line-art process diagram. Central circle labeled "Selbstbestimmung". Three surrounding rounded rectangles connected by arrows pointing to center: "Autonomie" (top left), "Kompetenz" (top right), "soziale Eingebundenheit" (bottom). Each rectangle has 2 sub-items: Autonomie has "Eigenwahl", "Selbstwirksamkeit"; Kompetenz has "Meisterschaft", "Optimale Herausforderung"; soziale Eingebundenheit has "Zugehörigkeit", "Beziehungsqualität". Arrow from center downward to vertical slider labeled "Regulationsstufen". Slider from top to bottom: "intrinsische Regulation", "identifizierte Regulation", "introjizierte Regulation", "äußere Regulation". Contrast bar on far right: greenish tint at top for "autonom", gray at bottom for "kontrolliert". ViewBox 0 0 500 400. Stroke #1a1a1a, 2px main, 1px sub. No fill except light #d4a8a8 at 10% in central circle and top slider region.
    caption: |
      Die Selbstbestimmungstheorie zeigt, wie die Befriedigung der drei Grundbedürfnisse intrinsische Motivation aufrechterhält — während extrinsische Regulationsstufen vom Selbst nach außen verlaufen und kontrolliertes Handeln anzeigen.

  - type: "visual"
    svg_description: |
      Clean line-art comparison diagram. Three horizontal process flows stacked vertically, each showing "Reiz" on left and "Emotion" on right. Top flow (James-Lange): solid arrow from Reiz to "Körperreaktion" box, then solid arrow to "Bewusstsein/Emotion" box. Label above: "Körper zuerst". Middle flow (Cannon-Bard): arrow from Reiz splits at diamond node into two parallel arrows to "Körperreaktion" and "Bewusstsein/Emotion" simultaneously. Label above: "Thalamus aktiviert beides". Bottom flow (Schachter-Singer): arrow from Reiz to "unspezifische Erregung" box, then arrow to "kognitive Bewertung" diamond, then arrow to "Emotion". Dashed feedback arrow from Emotion back to Bewertung. Label above: "Erregung + Kognition". A small overlay circle at right labeled "Appraisal" with text "kognitive Bewertung moduliert alle Stufen". ViewBox 0 0 500 400. Stroke #1a1a1a, 2px main, 1px sub. No fill except light #d4a8a8 at 10% behind Emotion boxes.
    caption: |
      Die drei klassischen Emotionstheorien unterscheiden sich in der kausalen Reihenfolge: James-Lange lässt den Körper vorausgehen, Cannon-Bard postuliert Gleichzeitigkeit, Schachter-Singer setzt die kognitive Interpretation der unspezifischen Erregung entscheidend ein.

  - type: "deep_dive"
    text: |
      ### Das Motivation-Emotion-Problem: Ein oder zwei Systeme?

      **Heckhausen und Heckhausen (2010)** betonen die funktionale Einheit von Motivation und Emotion. Motivationen erzeugen Emotionen durch das Streben nach Zielen, Emotionen generieren Motivationen durch affektive Bewertung. Diese Wechselwirkung erschwert eine strenge Trennung beider Prozesse auf neurobiologischer Ebene.

      ### Kritik an der Basisemotionsthese

      **Ekman (1992)** argumentierte für universelle Basisemotionen, doch die Konstruktvalidität des Konzepts bleibt umstritten. Kulturelle Variabilität in Emotionswahrnehmung und das Fehlen eindeutiger neurobiologischer Korrelate einzelner Basisemotionen werfen Fragen auf (Scherer et al., 2001). Die Debatte zwischen Nativisten und Konstruktivisten prägt die Emotionsforschung bis heute.
    highlight_red:
      - "Heckhausen und Heckhausen (2010) betonen die funktionale Einheit von Motivation und Emotion"
