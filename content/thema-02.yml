  - type: "visual"
    svg_description: |
      SVG 1 — Gestaltgesetze-Demonstration (ViewBox 0 0 400 300, clean line-art, Wahrnehmung/Optik):
      - Panel A — Gesetz der Nähe: Zwei Reihen von je fünf Kreisen, horizontale Abstände klein, vertikale Abstände groß; Leser sieht Spalten statt Zeilen. Beschriftung: "Gesetz der Nähe"
      - Panel B — Gesetz der Ähnlichkeit: 3x3 Raster aus Kreisen, mittlere Reihe Quadrate statt Kreise; Leser sieht drei Zeilen, mittlere als separate Gruppe. Beschriftung: "Gesetz der Ähnlichkeit"
      - Panel C — Gesetz der guten Fortsetzung: Zwei überlappende wellenförmige Linien, die als zwei glatte Kurven wahrgenommen werden statt als vier zackige Segmente. Beschriftung: "Gesetz der guten Fortsetzung"
      - Panel D — Gesetz der Geschlossenheit: Vier Kreisbögen, die ein Quadrat andeuten, obwohl die Seiten fehlen. Beschriftung: "Gesetz der Geschlossenheit"
      - Panel E — Gesetz der gemeinsamen Region: Zwei Gruppen von Punkten, jede in einem abgerundeten Rechteck eingeschlossen. Beschriftung: "Gesetz der gemeinsamen Region"
      - Anordnung: 2x3 Raster, Panel E über zwei Spalten zentriert
      - Deutsche Beschriftungen in 12px DM Sans, Stroke #1a1a1a 2px, keine Füllung außer leichtem Tab-Farbton-Hintergrund für Regionen
      Title: "Demonstration der fünf klassischen Gestaltgesetze durch geometrische Anordnungen"
      Desc: "Fünf Panels zeigen, wie Nähe, Ähnlichkeit, gute Fortsetzung, Geschlossenheit und gemeinsame Region die automatische Gruppierung von Reizen steuern"
    caption: "Die Grafik zeigt, wie identische Reize je nach räumlicher Anordnung, Ähnlichkeit oder Kontext in völlig verschiedene Gruppen und Gestalten organisiert werden — die zentrale Leistung der visuellen Wahrnehmung."

  - type: "visual"
    svg_description: |
      SVG 2 — Figure-Grund-Reversibilität (ViewBox 0 0 400 200, clean line-art):
      - Klassische Vase-Gesicht-Figur in der Mitte: Zwei schwarze Profile von Angesichtern, die sich gegenüberstehen; der dazwischenliegende weiße Raum bildet eine Vase
      - Beschriftung links: "Gesichter als Figur", Beschriftung rechts: "Vase als Figur"
      - Pfeile deuten auf die jeweilige Figurorganisation hin
      - Gestrichelte Linie zeigt die Grenze zwischen Figur und Grund
      - Deutsche Beschriftung unten: "Figure-Grund-Organisation und Reversibilität"
      - Stroke #1a1a1a 2px, keine Farbfüllung außer schwarzen Profilen
      Title: "Klassische Vase-Gesicht-Figur als Demonstration der Reversibilität"
      Desc: "Zwei gegenüberliegende Gesichtsprofile erzeugen im Zwischenraum eine Vase — ein Paradebeispiel für wechselnde Figure-Grund-Organisation"
    caption: "Das Bild demonstriert, wie ein und dasselbe Reizfeld zwei gleichberechtigte Organisationen zulässt — Gesichter oder Vase — und damit die Reversibilität der Wahrnehmung anschaulich macht."

  - type: "deep_dive"
    text: |
      **Neuronal korreliert: Wo im Gehirn Gestalten entstehen**

      Wagemans et al. (2012) fassen drei Jahrzehnte neurophysiologische Forschung zusammen und zeigen, dass Gestaltgesetze nicht bloße Heuristiken des Betrachters sind, sondern in den frühen visuellen Arealen des Gehirns verankert sind. Neuronale Populationen im primären visuellen Kortex (V1) und in höheren Arealen wie V2 und V4 kodieren bereits Kontinuität, Geschlossenheit und gemeinsame Region als Populationencode. Dies bedeutet, dass Gestaltorganisation weitgehend preattentiv abläuft — bevor bewusste Aufmerksamkeit einsetzt.

      **Kritik und moderne Erweiterung**

      Todorovic (2008) weist darauf hin, dass die klassischen Gestaltgesetze deskriptiv bleiben und keine kausale Erklärung der zugrundeliegenden Mechanismen liefern. Die moderne computergestützte Bildanalyse nutzt Gestaltprinzipien jedoch erfolgreich für Objekterkennungsalgorithmen. Palmer (1999) argumentiert zudem, dass Erfahrung und Top-Down-Prozesse die Gestaltwahrnehmung modifizieren — ein Betrachter, der eine bestimmte Figur erwartet, neigt dazu, sie auch in ambigen Reizen zu finden. Diese Beobachtung relativiert die ursprüngliche Behauptung einer reinen, erfahrungsunabhängigen Gestaltorganisation.
