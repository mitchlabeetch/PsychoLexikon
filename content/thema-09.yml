  - type: "deep_dive"
    text: |
      ### Der Validitäts-Trade-off als Planungsproblem

      Campbell und Stanley (1963) lieferten nicht nur eine Taxonomie, sondern auch eine Hierarchie: Ohne interne Validität ist externe Validität wertlos, denn man generalisiert dann nur Scheinursachen. Gleichzeitig warnen **Shadish et al. (1991)** davor, interne Validität als alleinigen Goldstandard zu betrachten — eine randomisierte Studie in klinisch irrelevanten Bedingungen bleibt methodisch makellos und praktisch nutzlos.

      ### Konfounding versus Messfehler

      Ein weiterer Unterschied ist entscheidend: Die **Bedingungskonfounding** entsteht, wenn die unabhängige Variable mit einer Störvariable vermischt ist — etwa wenn Therapie A immer von einem sympathischeren Therapeuten gegeben wird, was ein Planungsfehler ist.

      Messfehler hingegen betrifft die abhängige Variable und lässt sich durch Reliabilität quantifizieren. Beide Probleme schwächen Validität, aber sie erfordern unterschiedliche Gegenmaßnahmen.
    highlight_blue:
      - "Bedingungskonfounding"
    tooltips:
      Bedingungskonfounding: "Wenn eine Störvariable systematisch mit der experimentellen Bedingung verknüpft ist — zum Beispiel ein charismatischer Therapeut, der nur die neue Methode anwendet."
    highlight_red:
      - "Shadish et al. (1991) warnen davor, interne Validität als alleinigen Goldstandard zu betrachten"
    sources_inline:
      Shadish et al. (1991) warnen davor, interne Validität als alleinigen Goldstandard zu betrachten: "Shadish, W. R., Cook, T. D., & Leviton, L. C. (1991). Foundations of program evaluation: Theories of practice. Sage."

  - type: "example"
    text: "Du testest ein neues Schlafgetränk an 20 Freunden — alle schlafen besser. Doch die Freunde wussten, dass sie etwas Neues tranken (Placebo), testeten am Wochenende (History) und zwei Schlafgestörte sind ausgestiegen (Mortality). Ohne Kontrollgruppe, Doppelblind und Randomisierung bleibt dein 'Erfolg' eine Anekdote."

  - type: "summary"
    text: |
      • Interne Validität sichert die Ursache-Wirkung-Schätzung; externe Validität sichert die Übertragbarkeit auf die Alltagswelt.
      • Randomisierung, Kontrollgruppe und Doppelblind sind die drei Säulen, die klassische Validitätsbedrohungen (History, Maturation, Selection, Mortality) abwehren.
      • Interne und externe Validität können im Konflikt stehen: perfekte Kontrolle erkauft man sich oft mit künstlichen Bedingungen.

