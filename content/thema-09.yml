subject_meta:
  title: "Experimentelle Versuchsplanung: Interne und Externe Validität"
  discipline: "Methodenlehre"
  difficulty: "Erstsemester-Komplexitätsgrad"
  tab_color: "#ffe6a7"
  tab_number: 9

content_blocks:
  - type: "lead"
    text: "Wenn eine Firma behauptet, ihr neues Lern-App wirke besser als Bücher — wie weißt du, dass nicht einfach nur motiviertere Schüler die App gewählt haben? Gute Versuchsplanung schützt vor genau diesem Irrtum. Sie unterscheidet echte Ursachen von Zufall und Schein."

  - type: "definition"
    text: "Die **interne Validität** sichert, dass eine beobachtete Wirkung tatsächlich von der vermuteten Ursache herrührt. Die **externe Validität** prüft, ob dieses Ergebnis über das Labor hinaus gilt. Beide Dimensionen bestimmen, ob ein Experiment Erkenntnis oder Illusion produziert."
    highlight_blue:
      - "interne Validität"
      - "externe Validität"
    tooltips:
      interne Validität: "Der Grad der Sicherheit, mit dem eine Veränderung der abhängigen Variablen tatsächlich auf die unabhängige Variable zurückzuführen ist — nicht auf Nebeneffekte wie Zeit oder Selbstselektion."
      externe Validität: "Der Grad, in dem Ergebnisse eines Experiments auf andere Personen, Situationen oder Zeitpunkte übertragbar sind — die Generalisierbarkeit des Befunds."

  - type: "explanation"
    text: |
      ### Die zwei Seiten der Validitätsmedaille

      Jedes Experiment steht vor einem Dilemma: Je strenger du die Bedingungen kontrollierst, desto sicherer wird die innere Kausalität — aber desto künstlicher wirkt die Situation. **Campbell und Stanley (1963)** formulierten diesen Spannungsbogen als systematischen Katalog von Validitätsbedrohungen. Sie unterschieden dabei Störquellen, die die innere Ursache-Wirkungsschätzung trüben, von jenen, die die Übertragbarkeit auf die Realwelt einschränken.

      ### Störvariablen, die interne Validität angreifen

      Die **Störvariable** ist der heimliche Feind jeder Kausalschätzung. Sie verfälscht das Ergebnis, weil sie mit der unabhängigen Variablen verknüpft ist. Campbell und Stanley nannten vier klassische Bedrohungen: **History** (ein Ereignis tritt während des Experiments auf und wirkt auf alle oder eine Gruppe), **Maturation** (die Versuchspersonen verändern sich einfach durch Zeitablauf), **Selection** (die Gruppen unterschieden sich schon vor dem Experiment) und **Mortality** (ein systematischer Ausfall von Probanden verzerrt die Stichprobe).

      ### Randomisierung als Schlüssel zur internen Validität

      Die **Randomisierung** verteilt alle bekannten und unbekannten Störvariablen zufällig über die Bedingungen. Sie ist das stärkste Instrument, um Selection und andere Bedrohungen zu neutralisieren. **West und Thoemmes (2010)** zeigten, dass randomisierte Designs kausale Schlüsse am robustesten absichern, weil sie die Gruppen im Erwartungswert gleichsetzen.

      Die **Kontrollgruppe** ergänzt dies: Sie erhält keine Behandlung und dient als Maßstab für den natürlichen Verlauf. Ohne sie weiß man nicht, was „ohnehin“ passiert wäre.

      ### Placebo und Doppelblind — Schutz vor Erwartungseffekten

      Selbst bei Randomisierung bleibt eine Bedrohung: Die Erwartung der Versuchspersonen oder des Experimentators kann das Ergebnis verfälschen. Die **Placebo**-Kontrolle gibt einer Kontrollgruppe eine scheinbare Behandlung, um Erwartungseffekte auszugleichen. Das **Doppelblind**-Verfahren geht weiter: Weder Proband noch Versuchsleiter wissen, wer welche Bedingung erhält.

      So wird verhindert, dass subtile Verhaltensänderungen — freundlichere Rückfragen, unbewusste Bewertungstendenzen — die Messung trüben.

      ### Externe Validität: Gilt das Ergebnis auch draußen?

      Ein perfekt intern valides Experiment nützt wenig, wenn es nur für 19-jährige Psychologie-Studierende um 10 Uhr vormittags im weißen Labor gilt. **Shadish et al. (1991)** betonten, dass interne und externe Validität sich gegenseitig ausschließen können: Je künstlicher die Kontrolle, desto geringer die Übertragbarkeit.

      Die **ökologische Validität** fragt, ob die Untersuchungssituation die Alltagswelt abbildet. Die **Kriteriumsvalidität** prüft, ob das Messinstrument wirklich das misst, was es beansprucht — abgeglichen mit einem externen Kriterium wie Berufserfolg oder Therapieverlauf.
