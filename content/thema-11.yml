  - type: "visual"
    svg_description: |
      Clean line-art process flow. Vertical stack of three rounded rectangles (rx=4) connected by upward arrows. Bottom rectangle: "Objektivität" with three sub-labels beneath: "Durchführung", "Auswertung", "Interpretation". Middle rectangle: "Reliabilität" with three sub-labels: "Test-Retest", "Interne Konsistenz (α)", "Interrater". Top rectangle: "Validität" with three sub-labels: "Inhalt", "Kriterium", "Konstrukt". Dashed arrow from Reliabilität to Validität labeled "notwendig, aber nicht hinreichend". Dotted frame around Validität labeled "wissenschaftliche Brauchbarkeit". All text in German. ViewBox 0 0 400 400. Stroke #1a1a1a, 2px main lines, 1px sub-lines. No fill except light #d4a8a8 at 10% opacity behind Validität box.
    caption: |
      Die drei Gütekriterien bilden eine Hierarchie: Objektivität ist Grundvoraussetzung, Reliabilität sichert Messgenauigkeit, Validität begründet den wissenschaftlichen Nutzen — wobei jede höhere Stufe die darunterliegende voraussetzt, aber nicht automatisch erfüllt.

  - type: "visual"
    svg_description: |
      Clean line-art matrix grid. 4x4 grid representing a Multitrait-Multimethod-Matrix schematic. Rows labeled: "Extraversion (Fragebogen)", "Extraversion (Beobachtung)", "Neurotizismus (Fragebogen)", "Neurotizismus (Beobachtung)". Same labels for columns. Diagonal cells (Monotrait-Monomethod) have bold borders and "++" symbol. Off-diagonal same-trait cells (Monotrait-Heteromethod) have medium borders and "+". Heterotrait cells have light borders and "o". German legend at bottom: "++ = konvergente Validität", "+ = methodenspezifischer Einfluss", "o = diskriminante Validität". ViewBox 0 0 500 400. Stroke #1a1a1a, 2px grid lines, 1px internal. No fill except light #d4a8a8 at 10% in diagonal cells.
    caption: |
      Die Multitrait-Multimethod-Matrix zeigt, wie ein Konstrukt nur dann valide ist, wenn Messungen desselben Merkmals mit verschiedenen Methoden einander ähnlich sind — nicht jedoch Messungen verschiedener Merkmale.

  - type: "deep_dive"
    text: |
      ### Der logische Status der Validität

      **Cronbach und Meehl (1955)** stellten die Konstruktvalidität in den Mittelpunkt psychometrischen Denkens. Sie verstanden Validität nicht als statische Eigenschaft, sondern als kontinuierlichen Evidenzprozess. Jeder neue empirische Befund kann die Validitätsannahme eines Tests bestätigen oder infrage stellen.

      ### Die AERA-Standards und aktuelle Praxis

      Die **Standards for Educational and Psychological Testing (AERA et al., 2014)** fassen alle Validitätsformen unter dem Validitätsbegriff zusammen. Sie betonen, dass Validität keine direkt beobachtbare Eigenschaft ist, sondern eine Schlussfolgerung aus dem Gesamtevidenznetz. **Wilkinson und die APA Task Force (1999)** forderten transparente Berichterstattung psychometrischer Kennwerte in allen Publikationen.
