  tab_number: 11

content_blocks:
  - type: "lead"
    text: |
      Ob ein IQ-Test tatsächlich Intelligenz misst oder nur Rechengeschwindigkeit erfasst, entscheiden drei Gütekriterien. Jeder psychologische Test muss objektiv, reliabel und valide sein, damit seine Ergebnisse wissenschaftlich verwertbar sind. Diese Kriterien bilden das Fundament diagnostischer Entscheidungen in Klinik, Bildung und Arbeitspsychologie.

  - type: "definition"
    text: |
      Die **Objektivität** (Unabhängigkeit vom Tester), **Reliabilität** (Messgenauigkeit) und **Validität** (Gültigkeit) sind die drei Kardinaltugenden psychologischer Tests. Sie gewährleisten, dass Messwerte nicht vom Beobachter abhängen, bei Wiederholung stabil bleiben und tatsächlich das erfassen, was sie vorgeben zu messen.
    highlight_blue:
      - "Objektivität"
      - "Reliabilität"
      - "Validität"
    tooltips:
      Objektivität: "Eigenschaft eines Tests, bei dem Durchführung, Auswertung und Interpretation unabhängig von der testenden Person erfolgen — kein Spielraum für subjektive Einflüsse."
      Reliabilität: "Messgenauigkeit und Zuverlässigkeit eines Tests; ein reliabler Test liefert bei wiederholter Anwendung ähnliche Ergebnisse."
      Validität: "Gültigkeit eines Tests; der zentrale Nachweis, dass ein Test tatsächlich das misst, was er beansprucht."

  - type: "explanation"
    text: |
      ### Die drei Säulen psychometrischer Qualität

      Jeder psychologische Test muss drei Bedingungen erfüllen, um wissenschaftlich akzeptabel zu sein. **Objektivität** bedeutet, dass Testdurchführung, -auswertung und -interpretation unabhängig von der testenden Person sind. Eine objektive Auswertung liefert dieselben Ergebnisse, ob der Test von einer erfahrenen Psychologin oder einer geschulten Assistentin durchgeführt wird.

      ### Objektivität auf drei Ebenen

      Die **Durchführungsobjektivität** verlangt eindeutige Instruktionen, die keinen Spielraum für individuelle Abweichungen lassen. Die **Auswertungsobjektivität** erfordert standardisierte Scoring-Regeln, die jede subjektive Interpretation ausschließen. Die **Interpretationsobjektivität** sichert, dass die Bedeutung der Ergebnisse nachvollziehbar und regelgeleitet ist.

      ### Reliabilität: Wie stabil misst der Test?

      **Reliabilität** bezeichnet die Messgenauigkeit und Zuverlässigkeit eines Verfahrens. Ein reliabler Test erzeugt bei wiederholter Anwendung unter gleichen Bedingungen ähnliche Ergebnisse. **Cronbach und Meehl (1955)** betonten, dass Reliabilität eine notwendige, aber keine hinreichende Bedingung für wissenschaftliche Brauchbarkeit ist.

      ### Formen der Reliabilität

      Die **Test-Retest-Reliabilität** prüft die zeitliche Stabilität durch zwei Testungen derselben Personen. Die **interne Konsistenz** erfasst, ob alle Items eines Tests denselben Konstrukt messen, quantifiziert durch **Cronbachs α** (Alpha).

      Werte ab α = .80 gelten in der Regel als akzeptabel, Werte ab .90 als gut (Moosbrugger & Kelava, 2012).

      ### Die Interrater-Reliabilität

      Die **Interrater-Reliabilität** misst die Übereinstimmung unabhängiger Beurteiler bei der Auswertung offener Verfahren. Bei beobachtungsbasierten Diagnosen oder projektiven Tests ist diese Form besonders kritisch. Geringe Interrater-Übereinstimmung deutet auf mangelnde Auswertungsobjektivität hin.

      ### Validität: Misst der Test das Richtige?

      **Validität** ist die zentrale Frage, ob ein Test tatsächlich das misst, was er beansprucht. Sie gilt als der wichtigste Güteaspekt, da ein hochreliabler Test völlig irrelevante Dinge präzise messen kann. Die **AERA-Standards (2014)** definieren Validität als argumentativ gestützte Schlussfolgerung aus Testscores.

      ### Die drei Validitätsformen

      Die **Inhaltsvalidität** beurteilt, ob die Testitems das zu messende Merkmalsuniversum repräsentativ abbilden. Die **Kriteriumsvalidität** prüft die statistische Beziehung zwischen Testwerten und einem externen Kriterium wie Schulnoten oder Berufserfolg. Die **Konstruktvalidität** untersucht, ob empirische Befunde mit der theoretischen Annahme über das gemessene Konstrukt übereinstimmen (Cronbach & Meehl, 1955).

      ### Konstruktvalidität im Detail

      **Cronbach und Meehl (1955)** etablierten die **Konstruktvalidität** als den übergeordneten Validitätsbegriff. Sie erfordert die Integration verschiedener empirischer Evidenzen zu einem kohärenten theoretischen Netz. Das Konzept umfasst **konvergente Validität** (hohe Korrelation mit verwandten Messungen) und **diskriminante Validität** (geringe Korrelation mit unabhängigen Konstrukten).

      ### Multitrait-Multimethod-Matrix

      Die **Multitrait-Multimethod-Matrix** ist ein systematisches Schema zur Prüfung von Konstruktvalidität. Sie korreliert mehrere Merkmale, die jeweils mit mehreren Methoden erfasst wurden, miteinander. Hohe Monotrait-Monomethod-Korrelationen bei gleichzeitig niedrigen Heterotrait-Korrelationen bestätigen die konvergente und diskriminante Validität eines Konstrukts (Moosbrugger & Kelava, 2012).

      ### Face Validity versus Construct Validity

      Die **Face Validity** (oberflächliche Validität) beschreibt den subjektiven Eindruck, ob ein Test das Richtige misst. Sie ist keine echte psychometrische Eigenschaft, sondern eine pragmatische Anmutung, die die Testmotivation der Probanden beeinflusst. Die **Konstruktvalidität** hingegen ist ein streng wissenschaftlicher Nachweis, der empirische Evidenz und theoretische Argumentation verbindet.
