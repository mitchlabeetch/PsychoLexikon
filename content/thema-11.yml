  - type: "example"
    text: |
      Ein deutscher Gymnasiast absolviert einen Begabungstest für die Hochschulzulassung. Wenn verschiedene Testleiter unterschiedliche Anweisungen geben, verletzt das die **Objektivität**. Wenn derselbe Test nach zwei Wochen völlig andere Ergebnisse liefert, fehlt **Reliabilität**. Und wenn der Test hervorragend Mathematikleistung vorhersagt, aber als "Kreativitätstest" verkauft wird, scheitert er an der **Validität**.

  - type: "summary"
    text: |
      - Objektivität, Reliabilität und Validität bilden die unverzichtbare Dreifaltigkeit psychologischer Tests.
      - Reliabilität ist notwendig, aber nicht hinreichend für Validität: Ein präziser Schuss ins Leere bleibt ein Fehlschuss.
      - Konstruktvalidität ist der Goldstandard, da sie empirische Befunde und theoretische Annahmen in ein kohärentes Netz integriert.

